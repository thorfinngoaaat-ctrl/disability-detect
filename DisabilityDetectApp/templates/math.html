<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Screener - DisabilityDetect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fe; font-family: 'Inter', sans-serif; }
        .card-math { max-width: 600px; margin: 50px auto; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .math-text { font-size: 3.5rem; font-weight: 700; color: #4338ca; }
        #answerInput { font-size: 2rem; text-align: center; border-radius: 15px; border: 2px solid #e0e7ff; }
        .progress-bar { transition: width 0.3s ease; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card card-math p-5 text-center">
        <div id="start-screen">
            <h2 class="mb-4">Math Processing Check</h2>
            <p class="text-muted mb-4">You will see 10 math problems. Solve them as fast as you can!</p>
            <button class="btn btn-primary btn-lg px-5" onclick="startScreener()">Start Now</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="progress mb-4" style="height: 8px;">
                <div id="pBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <div class="math-text mb-4" id="qBox"></div>
            <input type="number" id="answerInput" class="form-control mb-4" autocomplete="off">
            <button class="btn btn-indigo btn-lg w-100" style="background:#4338ca; color:white;" onclick="handleNext()">Submit Answer</button>
        </div>

        <div id="loading-screen" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">Analyzing processing patterns...</p>
        </div>
    </div>
</div>

<script>
const problems = {{ questions|safe }};
let idx = 0;
let qStart = 0;
let tStart = 0;
let logs = [];

function startScreener() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    nextQuestion();
}

function nextQuestion() {
    if (idx >= problems.length) return finalize();
    
    document.getElementById('pBar').style.width = ((idx / problems.length) * 100) + '%';
    document.getElementById('qBox').textContent = problems[idx].q;
    
    const input = document.getElementById('answerInput');
    input.value = '';
    input.focus();
    
    qStart = performance.now();
    tStart = 0; 
}

// Track when typing starts for "Mental Effort" calculation
document.getElementById('answerInput').addEventListener('input', () => {
    if (!tStart) tStart = performance.now();
});

// Submit on Enter
document.getElementById('answerInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleNext();
});

function handleNext() {
    const val = document.getElementById('answerInput').value;
    if (val === "") return;

    const end = performance.now();
    const duration = end - qStart;
    const typingDuration = tStart ? (end - tStart) : 0;
    
    logs.push({
        q: problems[idx].q,
        ans: val,
        expected: problems[idx].a,
        isCorrect: parseInt(val) === problems[idx].a,
        duration: duration,
        typingDuration: typingDuration
    });

    idx++;
    nextQuestion();
}

async function finalize() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'block';

    const totalDuration = logs.reduce((s, l) => s + l.duration, 0);
    const totalTyping = logs.reduce((s, l) => s + l.typingDuration, 0);
    const correct = logs.filter(l => l.isCorrect).length;
    const totalChars = logs.reduce((s, l) => s + l.ans.length, 0);

    // Number Reversal Detection (e.g. expected 21, typed 12)
    const hasReversal = logs.some(l => {
        const rev = String(l.ans).split('').reverse().join('');
        return rev === String(l.expected) && String(l.ans) !== String(l.expected);
    });

    const payload = {
        totalQuestions: logs.length,
        correctAnswers: correct,
        avgResponseTime: totalDuration / logs.length,
        totalTime: totalDuration,
        totalTypingTime: totalTyping,
        avgTypingTime: totalTyping / logs.length,
        typingCPM: totalTyping > 0 ? (totalChars / (totalTyping / 60000)) : 0,
        typingWPM: totalTyping > 0 ? (totalChars / 5) / (totalTyping / 60000) : 0,
        numberReversal: hasReversal,
        responses: logs,
        summary: `Accuracy: ${Math.round((correct / logs.length) * 100)}%`
    };

    try {
        const response = await fetch('/save_math_result/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(payload)
        });
        
        if (response.ok) {
            window.location.href = '/home/';
        }
    } catch (e) {
        alert("Server error. Please check your connection.");
    }
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
</body>
</html>
