<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>User Profile | DisabilityDetect</title>

    <link href="https://fonts.googleapis.com/css?family=Open+Sans:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(to right, #ba71da 0%, #717fe1 51%, #ba71da 100%);
            --edu-purple: #dc8cdb;
            --text-dark: #2a2a2a;
            --text-gray: #7a7a7a;
        }

        body { font-family: 'Open Sans', sans-serif; background-color: #f8faff; margin-top: 100px; }
        
        /* Shared Header Style */
        .header-area {
            background-color: #fff;
            height: 80px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }
        .main-nav { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 24px; font-weight: 800; color: var(--text-dark); text-decoration: none; text-transform: uppercase; }
        .logo em { font-style: normal; color: var(--edu-purple); }
        
        .nav { list-style: none; display: flex; margin: 0; padding: 0; align-items: center; }
        .nav li { margin-left: 25px; }
        .nav li a { text-decoration: none; font-size: 14px; font-weight: 700; color: var(--text-dark); text-transform: uppercase; }

        /* Profile Specific Layout */
        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }

        .profile-sidebar {
            background: var(--primary-gradient);
            padding: 50px 40px;
            color: #fff;
            text-align: center;
            flex: 1;
            min-width: 300px;
        }

        .profile-main {
            padding: 50px 60px;
            flex: 2;
            min-width: 350px;
        }

        .profile-avatar-large {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
        }

        .sidebar-name { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .sidebar-tag { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-group { margin-bottom: 25px; }
        .info-label { font-size: 12px; font-weight: 700; color: var(--edu-purple); text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 16px; color: var(--text-dark); font-weight: 600; margin-top: 5px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: #fdfbff;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            text-align: center;
        }

        .stat-num { font-size: 24px; font-weight: 800; color: var(--edu-purple); }
        .stat-text { font-size: 12px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; }

        .btn-action {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-edit { background: var(--primary-gradient); color: #fff; background-size: 200% auto; border: none; }
        .btn-edit:hover { background-position: right center; transform: translateY(-2px); }
        
        .logout-btn { color: #ff5e5e; font-weight: 700; text-decoration: none; margin-top: 20px; display: block; font-size: 14px; }
    </style>
</head>

<body>

  <header class="header-area">
      <div class="container">
          <nav class="main-nav">
              <a href="/" class="logo">DISABILITY<em>DETECT</em></a>
              <ul class="nav">
                  <li><a href="/home/">Home</a></li>
                  <li><a href="/logout/" style="color: #ff5e5e;">Logout</a></li>
              </ul>
          </nav>
      </div>
  </header>

  <div class="container">
      <div class="profile-container">
          <div class="profile-sidebar">
              <div class="profile-avatar-large">
                  {{ user.username|first|upper }}
              </div>
              <div class="sidebar-name">{{ user.username }}</div>
              <div class="sidebar-tag">Verified Member</div>
              
              <div class="mt-5">
                  <a href="/test/" class="btn-action btn-edit" style="width: 100%;">Start New Test</a>
              </div>
          </div>

          <div class="profile-main">
              <div class="section-title">
                  <i class="fa fa-user-circle"></i> Account Information
              </div>

              <div class="row">
                  <div class="col-md-6">
                      <div class="info-group">
                          <div class="info-label">Username</div>
                          <div class="info-value">{{ user.username }}</div>
                      </div>
                  </div>
                  <div class="col-md-6">
                      <div class="info-group">
                          <div class="info-label">Email Address</div>
                          <div class="info-value">{{ user.email }}</div>
                      </div>
                  </div>
              </div>



              <div class="mt-4">
                  <a href="#" class="btn-action btn-edit">Edit Profile Settings</a>
                  <a href="/logout/" class="logout-btn"><i class="fa fa-sign-out"></i> Sign out of your account</a>
              </div>
          </div>
      </div>
  </div>

</body>
</html>
